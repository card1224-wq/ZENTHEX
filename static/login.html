<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Zenthex Login</title><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#050507;color:white;font-family:Inter,system-ui,sans-serif;padding:24px}.card{width:min(460px,100%);background:#111116;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:32px;box-shadow:0 30px 80px rgba(0,0,0,.45)}a{color:#a1a1aa;text-decoration:none;font-size:13px;font-weight:800}h1{margin:16px 0 6px;letter-spacing:4px;font-size:28px}p{color:#a1a1aa;line-height:1.6;margin:0 0 22px;font-size:14px}.tabs{display:grid;grid-template-columns:1fr 1fr;border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden;margin-bottom:18px}.tab{padding:12px;text-align:center;cursor:pointer;color:#a1a1aa;font-weight:900;background:#0b0b10}.tab.active{color:#04110e;background:#00ffcc}.panel{display:none}.panel.active{display:block}label{display:block;color:#d4d4d8;font-size:13px;font-weight:800;margin:14px 0 7px}input{width:100%;padding:13px;border-radius:8px;border:1px solid rgba(255,255,255,.14);background:#060609;color:white;font-size:15px;box-sizing:border-box}button.submit{width:100%;margin-top:18px;padding:14px;border:0;border-radius:8px;background:#00ffcc;color:#04110e;font-weight:900;cursor:pointer}.link-row{display:flex;justify-content:center;gap:12px;margin-top:14px}.link-row button{background:none;border:0;color:#a1a1aa;font-weight:800;cursor:pointer}.hint{margin-top:16px;padding:12px;border:1px solid rgba(245,158,11,.35);background:rgba(245,158,11,.08);color:#ffd28a;border-radius:8px;font-size:12px;line-height:1.6}.err{color:#ff6b6b;min-height:18px;margin-top:10px;font-size:13px;text-align:center}.ok{color:#00ffcc;min-height:18px;margin-top:10px;font-size:13px;text-align:center}</style></head><body><div class="card"><a href="index.html">← 메인으로</a><h1>ZENTHEX</h1><p>이메일 주소로 로그인합니다. 이메일 인증, 비밀번호 재설정, 결제내역과 영수증은 마이페이지에서 관리됩니다.</p><div class="tabs"><div class="tab active" onclick="switchTab('login')">로그인</div><div class="tab" onclick="switchTab('signup')">회원가입</div></div><section id="login-panel" class="panel active"><label>이메일</label><input type="email" id="login-email" placeholder="example@zenthex.com"/><label>비밀번호</label><input type="password" id="login-password"/><button class="submit" onclick="doLogin()">로그인</button><div class="link-row"><button onclick="findId()">아이디 찾기</button><button onclick="requestReset()">비밀번호 찾기</button></div><div id="login-error" class="err"></div><div id="login-ok" class="ok"></div></section><section id="signup-panel" class="panel"><label>이메일</label><input type="email" id="signup-email" placeholder="example@zenthex.com"/><label>비밀번호</label><input type="password" id="signup-password"/><button class="submit" onclick="doSignup()">회원가입</button><div id="signup-error" class="err"></div></section><section id="reset-panel" class="panel"><label>이메일</label><input type="email" id="reset-email"/><label>재설정 코드</label><input id="reset-code"/><label>새 비밀번호</label><input type="password" id="reset-password"/><button class="submit" onclick="resetPassword()">비밀번호 변경</button><div class="link-row"><button onclick="switchTab('login')">로그인으로 돌아가기</button></div><div id="reset-msg" class="ok"></div></section><div class="hint">Zenthex는 이메일 주소 기반으로 가입과 로그인을 처리합니다. 대표 권한은 서버 설정에 등록된 내부 계정에만 적용됩니다.</div></div><script>function switchTab(tab){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));if(tab==='login'){document.querySelectorAll('.tab')[0].classList.add('active');document.getElementById('login-panel').classList.add('active')}else if(tab==='signup'){document.querySelectorAll('.tab')[1].classList.add('active');document.getElementById('signup-panel').classList.add('active')}else{document.getElementById('reset-panel').classList.add('active')}}async function doLogin(){const email=document.getElementById('login-email').value.trim();const password=document.getElementById('login-password').value;const errorDiv=document.getElementById('login-error');errorDiv.innerText='';try{const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});const data=await res.json();if(!res.ok)throw new Error(data.detail||'로그인 실패');localStorage.setItem('zx_token',data.access_token);localStorage.setItem('zx_user',JSON.stringify(data.user_info));if(data.user_info.role==='owner'||data.user_info.role==='admin')location.href='admin.html';else location.href='account.html'}catch(e){errorDiv.innerText=e.message}}async function doSignup(){const email=document.getElementById('signup-email').value.trim();const password=document.getElementById('signup-password').value;const errorDiv=document.getElementById('signup-error');errorDiv.innerText='';try{const res=await fetch('/api/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});const data=await res.json();if(!res.ok)throw new Error(data.detail||'회원가입 실패');alert(data.role==='owner'?'대표 계정이 생성되었습니다.':'회원가입이 완료되었습니다. 이메일 인증을 진행해주세요.');document.getElementById('login-email').value=email;switchTab('login')}catch(e){errorDiv.innerText=e.message}}async function findId(){const email=document.getElementById('login-email').value.trim();const box=document.getElementById('login-ok');const res=await fetch('/api/auth/find-id',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});const data=await res.json();box.innerText=data.message||data.detail}async function requestReset(){const email=document.getElementById('login-email').value.trim();const box=document.getElementById('login-ok');const res=await fetch('/api/auth/password/request-reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});const data=await res.json();box.innerText=data.message||data.detail;document.getElementById('reset-email').value=email;switchTab('reset')}async function resetPassword(){const email=document.getElementById('reset-email').value.trim();const code=document.getElementById('reset-code').value.trim();const new_password=document.getElementById('reset-password').value;const res=await fetch('/api/auth/password/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,code,new_password})});const data=await res.json();document.getElementById('reset-msg').innerText=data.message||data.detail;if(res.ok)setTimeout(()=>switchTab('login'),900)}</script></body></html>
