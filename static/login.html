<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenthex - 로그인 / 회원가입</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body {
            margin: 0; padding: 0; 
            font-family: 'Outfit', sans-serif; 
            background: #050505; color: #fff;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        .auth-container {
            background: #111; padding: 40px; border-radius: 10px; width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333;
        }

        h2 { margin-top: 0; font-weight: 600; text-align: center; margin-bottom: 20px; }

        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #888; }
        .tab.active { color: #fff; border-bottom: 2px solid #00ffcc; font-weight: 600; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #ccc;}
        .form-group input { 
            width: 100%; padding: 10px; box-sizing: border-box; 
            background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; 
        }

        .btn-submit {
            width: 100%; padding: 12px; background: #00ffcc; color: #000;
            border: none; border-radius: 5px; font-weight: 800; cursor: pointer;
            margin-top: 10px; font-family: 'Outfit', sans-serif;
        }
        
        .btn-submit:hover { opacity: 0.8; }
        .error-msg { color: #ff4d4d; font-size: 13px; margin-top: 10px; text-align: center; }
        
        .form-panel { display: none; }
        .form-panel.active { display: block; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>ZENTHEX</h2>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('login')">로그인</div>
        <div class="tab" onclick="switchTab('signup')">회원가입</div>
    </div>

    <!-- Login Form -->
    <div id="login-panel" class="form-panel active">
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="login-email" placeholder="example@zenthex.com">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="login-password">
        </div>
        <button class="btn-submit" onclick="doLogin()">로그인</button>
        <div id="login-error" class="error-msg"></div>
    </div>

    <!-- Signup Form -->
    <div id="signup-panel" class="form-panel">
        <div class="form-group">
            <label>이메일</label>
            <input type="email" id="signup-email" placeholder="example@zenthex.com">
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="signup-password">
        </div>
        <button class="btn-submit" onclick="doSignup()">회원가입</button>
        <div id="signup-error" class="error-msg"></div>
    </div>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
        
        if (tab === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('login-panel').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('signup-panel').classList.add('active');
        }
    }

    async function doLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        const errorDiv = document.getElementById('login-error');
        errorDiv.innerText = "";
        
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            const data = await res.json();
            if(!res.ok) throw new Error(data.detail || "Login failed");
            
            localStorage.setItem('zx_token', data.access_token);
            window.location.href = '/';
        } catch(e) {
            errorDiv.innerText = e.message;
        }
    }

    async function doSignup() {
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;
        const errorDiv = document.getElementById('signup-error');
        errorDiv.innerText = "";
        
        try {
            const res = await fetch('/api/auth/signup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            const data = await res.json();
            if(!res.ok) throw new Error(data.detail || "Signup failed");
            
            alert("회원가입 성공! 로그인해주세요.");
            switchTab('login');
        } catch(e) {
            errorDiv.innerText = e.message;
        }
    }
</script>
</body>
</html>
